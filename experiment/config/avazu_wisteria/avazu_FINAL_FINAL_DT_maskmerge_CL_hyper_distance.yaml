# CL参数优化

base_config: ./
base_expid: FINAL_FINAL_DT_avazu_x4_050_050_maskmerge_CL_hyper
dataset_id: avazu_x4_050_050_maskmerge

# 数据集配置
dataset_config:
    avazu_x4_050_050_maskmerge:
        data_format: parquet
        data_root: /work/gm85/m85000/FuxiCTR/data/mask_merge/
        feature_cols:
        - {active: false, dtype: str, name: id, type: categorical}
        # 非个性化分类特征 Ad + context: 16+3=19
        - active: true
          dtype: str
          name: [ C1, banner_pos, site_id, site_domain, site_category, app_id, app_domain, app_category, C14, C15, C16, C17, C18, C19, C20, C21 ]
          type: categorical
        - {active: true, dtype: str, name: hour, preprocess: convert_hour, type: categorical}
        - {active: true, dtype: str, name: weekday, preprocess: convert_weekday, type: categorical}
        - {active: true, dtype: str, name: weekend, preprocess: convert_weekend, type: categorical}
        # Device 相关的个性化特征: 5
        - active: true
          dtype: str
          name: [ device_ip, device_id, device_model, device_type, device_conn_type ]
          type: categorical
        label_col: {dtype: float, name: click}
        feature_group_id: is_personalization
        min_categr_count: 2
        test_data: /scratch/dliu2/FuxiCTR/datasets/Avazu/Avazu_x4/test.csv
        train_data: /scratch/dliu2/FuxiCTR/datasets/Avazu/Avazu_x4/train.csv
        valid_data: /scratch/dliu2/FuxiCTR/datasets/Avazu/Avazu_x4/valid.csv
    avazu_x4_050_050_maskmerge_dt:
        data_format: parquet
        data_root: /work/gm85/m85000/FuxiCTR/data/mask_merge/
        feature_cols:
        - {active: false, dtype: str, name: id, type: categorical}
        # 非个性化分类特征 Ad + context: 16+3=19
        - active: true
          dtype: str
          name: [ C1, banner_pos, site_id, site_domain, site_category, app_id, app_domain, app_category, C14, C15, C16, C17, C18, C19, C20, C21 ]
          type: categorical
        - {active: true, dtype: str, name: hour, preprocess: convert_hour, type: categorical}
        - {active: true, dtype: str, name: weekday, preprocess: convert_weekday, type: categorical}
        - {active: true, dtype: str, name: weekend, preprocess: convert_weekend, type: categorical}
        # Device 相关的个性化特征: 5
        - active: true
          dtype: str
          name: [ device_ip, device_id, device_model, device_type, device_conn_type ]
          type: categorical
        label_col: {dtype: float, name: click}
        feature_group_id: is_personalization
        min_categr_count: 2
        test_data: /scratch/dliu2/FuxiCTR/datasets/Avazu/Avazu_x4/test.csv
        train_data: /scratch/dliu2/FuxiCTR/datasets/Avazu/Avazu_x4/train.csv
        valid_data: /scratch/dliu2/FuxiCTR/datasets/Avazu/Avazu_x4/valid.csv

# 模型基础配置
model_config:
    FINAL_FINAL_DT_avazu_x4_050_050_maskmerge_CL_hyper:
        model: DualTowerCL
        model_id: FINAL_FINAL_DTCN_avazu_maskmerge_hyper_distance
        model_root: /work/gm85/m85000/FuxiCTR/slurm_logs/FINAL_FINAL_DTCN_avazu_maskmerge_hyper_distance/
        dataset_id: avazu_x4_050_050_maskmerge
        debug_mode: false
        metrics: [AUC, logloss]
        monitor_mode: max
        optimizer: adam
        loss: binary_crossentropy
        shuffle: true
        task: binary_classification
        early_stop_patience: 2
        epochs: 100
        learning_rate: 0.001
        batch_size: 10000
        seed: 2019
        embedding_regularizer: 0
        net_regularizer: 0
        verbose: 0
        save_best_only: true
        use_tower_specific_monitoring: true        # 启用分塔监控
        personalized_monitor_metric: "AUC_group_1.0"    # 个性化塔监控指标
        non_personalized_monitor_metric: "AUC_group_2.0" # 非个性化塔监控指标
        tower_patience: 2                         # 分塔早停耐心值
        save_tower_models: true                   # 分别保存塔模型
        personalization_feature_list: [ device_ip, device_id, device_model, device_type, device_conn_type ]
        personalization_field: is_personalization
        personalized_model_type: FinalNet
        personalized_model_params:
          embedding_dim: 32
          block_type: 2B
          block1_dropout: 0.2
          block1_hidden_activations: ReLU
          block1_hidden_units: [ 800 ]
          block2_dropout: 0.3
          block2_hidden_activations: ReLU
          block2_hidden_units: [ 800, 800 ]
        non_personalized_model_type: FinalNet
        non_personalized_model_params:
          embedding_dim: 16
          block_type: 1B
          block1_dropout: 0.2
          block1_hidden_activations: ReLU
          block1_hidden_units: [ 800 ]
          block2_dropout: 0.3
          block2_hidden_activations: ReLU
          block2_hidden_units: [ 800, 800 ]
        training_mode: "parallel"  # 并行训练模式
        cl_loss_weight: 1.0  # CL总损失权重
      # CL损失组件权重
        knowledge_distillation_loss_weight: 0.0  # 知识蒸馏损失（核心）
        distance_loss_weight: 0.0  # 距离损失（备用）
        group_aware_loss_weight: 0.0  # 组感知损失（针对非个性化用户优化）
        feature_alignment_loss_weight: 0.0  # 特征对齐损失（可选）
        field_uniformity_loss_weight: 0.0   # 字段均匀性损失（可选）
        temperature: 4.0  # 知识蒸馏温度参数
      # === 特征级对比学习配置 ===
        use_feature_level_cl: True  # 是否启用特征级CL
        sequential_warmup_epochs: 20
        save_checkpoints: true
        reduce_lr_on_plateau: false  # 是否使用学习率衰减

tuner_space:
    non_personalized_model_params:
        - embedding_dim: 32
          block_type: 2B
          block1_dropout: 0.2
          block1_hidden_activations: ReLU
          block1_hidden_units: [800]
          block2_hidden_units: [800, 800]
          block2_dropout: 0.3
          block2_hidden_activations: ReLU
#        - embedding_dim: 16
#          block_type: 2B
#          block1_dropout: 0.2
#          block1_hidden_activations: ReLU
#          block1_hidden_units: [800]
#          block2_hidden_units: [800, 800]
#          block2_dropout: 0.3
#          block2_hidden_activations: ReLU
    personalized_model_params:
        - embedding_dim: 32
          block_type: 1B
          block1_dropout: 0.2
          block1_hidden_activations: ReLU
          block1_hidden_units: [800]
          block2_hidden_units: [800, 800]
          block2_dropout: 0.3
          block2_hidden_activations: ReLU
    cl_loss_weight: [1.0]
    sequential_warmup_epochs: [20]
#    training_mode: [sequential, parallel]
    training_mode: [parallel]
    knowledge_distillation_loss_weight: [0.0]
    field_uniformity_loss_weight: [0.0]
#    distance_loss_weight: [10.0, 100.0, 0.0, 1.0, 1000.0]
#    distance_loss_weight: [100.0, 0.0, 1.0, 1000.0]
    distance_loss_weight: [0.2, 0.5, 0.8, 2, 3, 4, 5, 6, 7, 8, 9]
#    distance_loss_weight: [0.0, 0.1]
    reduce_lr_on_plateau: [true, false]
    seed: [2019]
    embedding_regularizer: [1.0e-05]
    dataset_id: [avazu_x4_050_050_maskmerge, avazu_x4_050_050_maskmerge_dt]
#    seed: [2019, 2025, 42]
