# CL参数优化

base_config: ./
base_expid: PNN_PNN_DT_taobaoad_x1_050_050_maskmerge_dt_hyper
dataset_id: taobaoad_x1_050_050_maskmerge_dt

# 数据集配置
#      data_root: /scratch/dliu2/FuxiCTR/data/Taobao
dataset_config:
  taobaoad_x1_050_050_maskmerge_dt:
      data_format: parquet
      data_root: /scratch/dliu2/FuxiCTR/data/mask_merge/
      feature_cols:
        # 非个性化分类特征: 1 float + 7 categorical = 8 features
        - {active: true, dtype: float, name: price, type: numeric}
        - active: true
          dtype: str
          name: [adgroup_id, cate_id, campaign_id, customer, brand, pid, btag]
          type: categorical
        # 个性化分类特征: 9 int + 3 sequence = 12 features
        - active: true
          dtype: int
          fill_na: 0
          name: [userid, cms_segid, cms_group_id, final_gender_code, age_level, pvalue_level, shopping_level, occupation, new_user_class_level]
          type: categorical
        - {active: true, dtype: str, max_len: 50, name: cate_his, padding: pre, share_embedding: cate_id,
            splitter: ^, type: sequence}
        - {active: true, dtype: str, max_len: 50, name: brand_his, padding: pre, share_embedding: brand,
            splitter: ^, type: sequence}
        - {active: true, dtype: str, max_len: 50, name: btag_his, padding: pre, share_embedding: btag,
            splitter: ^, type: sequence}
      label_col: {dtype: float, name: clk}
      feature_group_id: is_personalization
      min_categr_count: 10
#      test_data:
      train_data:
      valid_data:
# 模型基础配置
model_config:
    PNN_PNN_DT_taobaoad_x1_050_050_maskmerge_dt_hyper:
        model: DualTowerModel
        model_id: PNN_PNN_DT_taobaoad_maskmerge_dt
        model_root: /scratch/dliu2/FuxiCTR/slurm_logs/PNN_PNN_DT_taobaoad_maskmerge_dt/
        dataset_id: taobaoad_x1_050_050_maskmerge_dt
        debug_mode: false
        metrics: [logloss, AUC]
        monitor_mode: max
        optimizer: adam
        loss: binary_crossentropy
        shuffle: true
        task: binary_classification
        early_stop_patience: 2
        epochs: 100
        learning_rate: 0.001
#        num_workers: 2
        batch_size: 10000
        monitor: {AUC: 1}
        seed: 2019
        embedding_regularizer: 5.0e-06
        net_regularizer: 0
        verbose: 0
        save_best_only: true
        use_tower_specific_monitoring: true        # 启用分塔监控
        personalized_monitor_metric: "AUC_group_1.0"    # 个性化塔监控指标
        non_personalized_monitor_metric: "AUC_group_2.0" # 非个性化塔监控指标
        tower_patience: 2                         # 分塔早停耐心值
        save_tower_models: true                   # 分别保存塔模型
        use_mask_for_all: false
        personalization_feature_list:  [userid, cate_his, brand_his, btag_his, age_level, shopping_level, cms_group_id, final_gender_code, cms_segid, occupation, pvalue_level, new_user_class_level ]
        personalization_field: is_personalization
        personalized_model_type: PNN
        personalized_model_params:
          embedding_dim: 32
          hidden_units: [ 512, 256 ]
        non_personalized_model_type: PNN
        non_personalized_model_params:
          embedding_dim: 32
          hidden_units: [ 512, 256 ]
        cl_loss_weight: 0.0  # CL总损失权重
        save_checkpoints: true

# personalization_feature_list: [ userid, cate_his, brand_his, btag_his, age_level, shopping_level, cms_group_id, final_gender_code, cms_segid, occupation, pvalue_level, new_user_class_level ]
# feature importance list: [userid, cate_id, cate_his, adgroup_id, price, btag_his, pid, brand_his, age_level, brand, customer, btag, occupation, pvalue_level, shopping_level, new_user_class_level, final_gender_code, cms_group_id, cms_segid, campaign_id]
tuner_space:
    personalized_model_params:
        - embedding_dim: 32
          hidden_units: [ 512, 256  ]
#        - embedding_dim: 32
#          hidden_units: [ 512, 256, 128 ]
    non_personalized_model_params:
#        - embedding_dim: 32
#          hidden_units: [ 512, 256  ]
#        - embedding_dim: 32
#          hidden_units: [ 512, 256, 128 ]
        - embedding_dim: 16
          hidden_units: [ 512, 256  ]
        - embedding_dim: 16
          hidden_units: [ 512, 256, 128 ]
    seed: [2019, 2025, 42]
    embedding_regularizer: [0.05]
    use_mask_for_all: [false, true]