# CL参数优化

base_config: ./
base_expid: FCN_FCN_DT_taobaoad_x1_050_050_maskmerge_CL_hyper
dataset_id: taobaoad_x1_050_050_maskmerge

# 数据集配置
dataset_config:
  taobaoad_x1_050_050_maskmerge_dt:
      data_format: parquet
      data_root: /scratch/dliu2/FuxiCTR/data/mask_merge/
      feature_cols:
      - {active: true, dtype: int, name: group_id, preprocess: copy_from(userid), remap: false,
          type: meta}
      -   active: true
          dtype: str
          name: [adgroup_id, cate_id, campaign_id, customer, brand, pid, btag]
          type: categorical
      -   active: true
          dtype: int
          fill_na: 0
          name: [userid, cms_segid, cms_group_id, final_gender_code, age_level, pvalue_level,
              shopping_level, occupation, new_user_class_level]
          type: categorical
      - {active: true, dtype: float, name: price, type: numeric}
      - {active: true, dtype: str, max_len: 50, name: cate_his, padding: pre, share_embedding: cate_id,
          splitter: ^, type: sequence}
      - {active: true, dtype: str, max_len: 50, name: brand_his, padding: pre, share_embedding: brand,
          splitter: ^, type: sequence}
      - {active: true, dtype: str, max_len: 50, name: btag_his, padding: pre, share_embedding: btag,
          splitter: ^, type: sequence}
      label_col: {dtype: float, name: clk}
      feature_group_id: is_personalization
      min_categr_count: 10
      test_data: /scratch/dliu2/FuxiCTR/datasets/TaobaoAd/processed/test.csv
      train_data: /scratch/dliu2/FuxiCTR/datasets/TaobaoAd/processed/train.csv
      valid_data: /scratch/dliu2/FuxiCTR/datasets/TaobaoAd/processed/valid.csv
  taobaoad_x1_050_050_maskmerge:
      data_format: parquet
      data_root: /scratch/dliu2/FuxiCTR/data/mask_merge/
      feature_cols:
      - {active: true, dtype: int, name: group_id, preprocess: copy_from(userid), remap: false,
          type: meta}
      -   active: true
          dtype: str
          name: [adgroup_id, cate_id, campaign_id, customer, brand, pid, btag]
          type: categorical
      -   active: true
          dtype: int
          fill_na: 0
          name: [userid, cms_segid, cms_group_id, final_gender_code, age_level, pvalue_level,
              shopping_level, occupation, new_user_class_level]
          type: categorical
      - {active: true, dtype: float, name: price, type: numeric}
      - {active: true, dtype: str, max_len: 50, name: cate_his, padding: pre, share_embedding: cate_id,
          splitter: ^, type: sequence}
      - {active: true, dtype: str, max_len: 50, name: brand_his, padding: pre, share_embedding: brand,
          splitter: ^, type: sequence}
      - {active: true, dtype: str, max_len: 50, name: btag_his, padding: pre, share_embedding: btag,
          splitter: ^, type: sequence}
      label_col: {dtype: float, name: clk}
      feature_group_id: is_personalization
      min_categr_count: 10
      test_data: /scratch/dliu2/FuxiCTR/datasets/TaobaoAd/processed/test.csv
      train_data: /scratch/dliu2/FuxiCTR/datasets/TaobaoAd/processed/train.csv
      valid_data: /scratch/dliu2/FuxiCTR/datasets/TaobaoAd/processed/valid.csv

# 模型基础配置
model_config:
    FCN_FCN_DT_taobaoad_x1_050_050_maskmerge_CL_hyper:
        model: DualTowerCL
        model_id: FCN_FCN_DT_taobaoad_maskmerge_dt_hyper
        model_root: /scratch/dliu2/FuxiCTR/slurm_logs/FCN_taobaoad_maskmerge_dt_hyper/
        dataset_id: taobaoad_x1_050_050_maskmerge
        debug_mode: false
        metrics: [AUC, logloss]
        monitor_mode: max
        optimizer: adam
        loss: binary_crossentropy
        shuffle: true
        task: binary_classification
        early_stop_patience: 2
        epochs: 100
        seed: 2019
        learning_rate: 0.001
        batch_size: 10000
        save_best_only: true
        verbose: 0
        net_regularizer: 0
        embedding_regularizer: 1.0e-05
        use_tower_specific_monitoring: true        # 启用分塔监控
        personalized_monitor_metric: "AUC_group_1.0"    # 个性化塔监控指标
        non_personalized_monitor_metric: "AUC_group_2.0" # 非个性化塔监控指标
        tower_patience: 2                         # 分塔早停耐心值
        save_tower_models: true                   # 分别保存塔模型
        personalization_feature_list: [ userid, cate_his, brand_his, btag_his, age_level, shopping_level, cms_group_id, final_gender_code, cms_segid, occupation, pvalue_level, new_user_class_level ]
        personalization_field: is_personalization
        personalized_model_type: DCNv3
        personalized_model_params:
            embedding_dim: 16
            num_deep_cross_layers: 4
            num_shallow_cross_layers: 4
            num_heads: 1
        non_personalized_model_type: DCNv3
        non_personalized_model_params:
            embedding_dim: 16
            num_deep_cross_layers: 4
            num_shallow_cross_layers: 4
            num_heads: 1
        cl_loss_weight: 1.0  # CL总损失权重
        training_mode: "parallel"  # 并行训练模式
        # CL损失组件权重
        knowledge_distillation_loss_weight: 0.0  # 知识蒸馏损失（核心）
        distance_loss_weight: 0.0  # 距离损失（备用）
        group_aware_loss_weight: 0.0  # 组感知损失（针对非个性化用户优化）
        feature_alignment_loss_weight: 0.0  # 特征对齐损失（可选）
        field_uniformity_loss_weight: 0.0   # 字段均匀性损失（可选）
        temperature: 4.0  # 知识蒸馏温度参数
        # === 特征级对比学习配置 ===
        use_feature_level_cl: True  # 是否启用特征级CL
        sequential_warmup_epochs: 3
        reduce_lr_on_plateau: true

tuner_space:
    cl_loss_weight: [1.0]
    personalized_model_params:
        - embedding_dim: 32
          num_heads: 1
          num_deep_cross_layers: 4
          num_shallow_cross_layers: 4
    non_personalized_model_params:
      - embedding_dim: 16
        num_heads: 1
        num_deep_cross_layers: 4
        num_shallow_cross_layers: 4
    embedding_regularizer: [0.05]
    training_mode: [parallel]
    sequential_warmup_epochs: [10]
#    training_mode: [sequential]
    knowledge_distillation_loss_weight: [0.0]
    field_uniformity_loss_weight: [0.0]
    distance_loss_weight: [0, 120, 150, 200]
    seed: [2019, 42, 2025]
    reduce_lr_on_plateau: [true]
    dataset_id: [taobaoad_x1_050_050_maskmerge]